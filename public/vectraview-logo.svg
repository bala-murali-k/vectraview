<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Subtle amber gradient for the eye lens -->
    <radialGradient id="lensGlow" cx="50%" cy="45%" r="52%">
      <stop offset="0%"  stop-color="#ffd87a" stop-opacity="1"/>
      <stop offset="55%" stop-color="#f5a623" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c97d10" stop-opacity="1"/>
    </radialGradient>
    <!-- Dark inner gradient for depth -->
    <radialGradient id="pupilDepth" cx="42%" cy="40%" r="58%">
      <stop offset="0%"  stop-color="#2a1f06"/>
      <stop offset="60%" stop-color="#0f0d08"/>
      <stop offset="100%" stop-color="#070605"/>
    </radialGradient>
    <!-- Subtle glow for the diamond facets -->
    <linearGradient id="facetTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="facetRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#f5a623" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#c97d10" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="outerRingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#2a2310"/>
      <stop offset="50%" stop-color="#1a1710"/>
      <stop offset="100%" stop-color="#0f0c08"/>
    </linearGradient>
    <!-- Clipping for the outer ring -->
    <clipPath id="diamondClip">
      <polygon points="200,30 370,200 200,370 30,200"/>
    </clipPath>
  </defs>

  <!-- ── Outer diamond ring (dark fill, amber stroke) ── -->
  <polygon
    points="200,24 376,200 200,376 24,200"
    fill="url(#outerRingGrad)"
    stroke="#f5a623"
    stroke-width="3.5"
    stroke-linejoin="round"
  />

  <!-- ── Inner diamond ring (slightly inset, lighter stroke) ── -->
  <polygon
    points="200,44 356,200 200,356 44,200"
    fill="none"
    stroke="#f5a623"
    stroke-width="1"
    stroke-linejoin="round"
    opacity="0.35"
  />

  <!-- ── Diamond facet: top-left face ── -->
  <polygon
    points="200,44 128,116 200,200 44,200"
    fill="url(#facetTop)"
  />

  <!-- ── Diamond facet: top-right face ── -->
  <polygon
    points="200,44 272,116 200,200 356,200"
    fill="url(#facetRight)"
  />

  <!-- ── Diamond facet: bottom hairline separators ── -->
  <line x1="200" y1="200" x2="200" y2="356" stroke="#f5a623" stroke-width="0.6" opacity="0.2"/>
  <line x1="44"  y1="200" x2="200" y2="200" stroke="#f5a623" stroke-width="0.6" opacity="0.15"/>
  <line x1="356" y1="200" x2="200" y2="200" stroke="#f5a623" stroke-width="0.6" opacity="0.15"/>

  <!-- ── V-mark cutlines from top vertex ── -->
  <line x1="200" y1="24" x2="128" y2="116" stroke="#f5a623" stroke-width="1.2" opacity="0.45"/>
  <line x1="200" y1="24" x2="272" y2="116" stroke="#f5a623" stroke-width="1.2" opacity="0.45"/>

  <!-- ── Central eye: outer amber iris ring ── -->
  <circle cx="200" cy="200" r="74" fill="url(#lensGlow)"/>

  <!-- ── Iris texture: segmentation lines ── -->
  <g opacity="0.18" stroke="#7a4e00" stroke-width="0.8" fill="none">
    <line x1="200" y1="126" x2="200" y2="274"/>
    <line x1="126" y1="200" x2="274" y2="200"/>
    <line x1="147" y1="147" x2="253" y2="253"/>
    <line x1="253" y1="147" x2="147" y2="253"/>
  </g>

  <!-- ── Iris ring: subtle amber ring inside ── -->
  <circle cx="200" cy="200" r="74" fill="none" stroke="#c97d10" stroke-width="2" opacity="0.5"/>
  <circle cx="200" cy="200" r="60" fill="none" stroke="#c97d10" stroke-width="1" opacity="0.3"/>

  <!-- ── Pupil ── -->
  <circle cx="200" cy="200" r="42" fill="url(#pupilDepth)"/>

  <!-- ── Pupil inner ring ── -->
  <circle cx="200" cy="200" r="42" fill="none" stroke="#f5a623" stroke-width="1.2" opacity="0.4"/>

  <!-- ── Vector diamond inside pupil ── -->
  <polygon
    points="200,168 232,200 200,232 168,200"
    fill="none"
    stroke="#f5a623"
    stroke-width="2"
    stroke-linejoin="round"
    opacity="0.9"
  />

  <!-- ── Center dot ── -->
  <circle cx="200" cy="200" r="5" fill="#f5a623" opacity="0.95"/>

  <!-- ── Specular highlight on lens ── -->
  <ellipse cx="182" cy="180" rx="16" ry="10"
    fill="white" opacity="0.12"
    transform="rotate(-20,182,180)"/>

  <!-- ── Tick marks around the iris (clock positions) ── -->
  <g stroke="#f5a623" stroke-width="1.5" stroke-linecap="round" opacity="0.5">
    <!-- 12 o'clock -->
    <line x1="200" y1="122" x2="200" y2="132"/>
    <!-- 3 o'clock -->
    <line x1="278" y1="200" x2="268" y2="200"/>
    <!-- 6 o'clock -->
    <line x1="200" y1="278" x2="200" y2="268"/>
    <!-- 9 o'clock -->
    <line x1="122" y1="200" x2="132" y2="200"/>
  </g>
  <!-- Smaller ticks at 45° -->
  <g stroke="#f5a623" stroke-width="0.8" stroke-linecap="round" opacity="0.3">
    <line x1="147.3" y1="147.3" x2="154.4" y2="154.4"/>
    <line x1="252.7" y1="147.3" x2="245.6" y2="154.4"/>
    <line x1="252.7" y1="252.7" x2="245.6" y2="245.6"/>
    <line x1="147.3" y1="252.7" x2="154.4" y2="245.6"/>
  </g>

  <!-- ── Corner anchor nodes (vector handle metaphor) ── -->
  <g fill="none" stroke="#f5a623" stroke-width="1.8" opacity="0.75">
    <!-- Top -->
    <rect x="193" y="17" width="14" height="14" rx="2"/>
    <!-- Right -->
    <rect x="369" y="193" width="14" height="14" rx="2"/>
    <!-- Bottom -->
    <rect x="193" y="369" width="14" height="14" rx="2"/>
    <!-- Left -->
    <rect x="17"  y="193" width="14" height="14" rx="2"/>
  </g>
  <!-- Small amber fill inside anchor squares -->
  <g fill="#f5a623" opacity="0.45">
    <rect x="196" y="20"  width="8" height="8" rx="1"/>
    <rect x="372" y="196" width="8" height="8" rx="1"/>
    <rect x="196" y="372" width="8" height="8" rx="1"/>
    <rect x="20"  y="196" width="8" height="8" rx="1"/>
  </g>

</svg>
